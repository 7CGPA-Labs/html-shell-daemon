name: Build and Test Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build OS Image & QEMU Smoke Test
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt 5 and System Dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            qtbase5-dev \
            qtdeclarative5-dev \
            qtwebengine5-dev \
            qml-module-qtquick2 \
            qml-module-qtquick-window2 \
            qml-module-qtquick-layouts \
            qml-module-qtquick-controls2 \
            qml-module-qtquick-dialogs \
            qml-module-qtwebchannel \
            qml-module-qtwebengine \
            libqt5dbus5 \
            live-build \
            isolinux \
            syslinux-common \
            xorriso \
            qemu-system-x86 \
            shellcheck

      - name: Install Latest Debian Keyring and Debootstrap
        run: |
          echo "[*] Downloading latest debootstrap..."
          curl -sLO http://archive.ubuntu.com/ubuntu/pool/main/d/debootstrap/debootstrap_1.0.134ubuntu1_all.deb
          echo "[*] Downloading latest debian-archive-keyring..."
          curl -sLO https://ftp.debian.org/debian/pool/main/d/debian-archive-keyring/debian-archive-keyring_2025.1_all.deb
          echo "[*] Installing packages..."
          sudo dpkg -i debootstrap_1.0.134ubuntu1_all.deb debian-archive-keyring_2025.1_all.deb

      - name: Verify Setup Scripts Syntax
        run: |
          echo "[*] Checking bash scripts syntax..."
          for f in scripts/*.sh setup-factory.sh; do
            echo "Checking $f..."
            bash -n "$f"
          done
          echo "[*] Running shellcheck on scripts..."
          shellcheck scripts/*.sh setup-factory.sh || echo "⚠️ Shellcheck reported minor warnings"

      - name: Verify Python Script Syntax
        run: |
          echo "[*] Checking Python scripts syntax..."
          python3 -m py_compile scripts/ipc-bridge-daemon.py

      - name: Compile C++ Shell Core
        run: |
          echo "[*] Compiling Shell Core..."
          qmake AnodyneOS.pro
          make -j$(nproc)
          if [ ! -f AnodyneOS ]; then
            echo "❌ ERROR: Compilation failed! AnodyneOS binary not found."
            exit 1
          fi

      - name: Stage Factory and Build ISO
        run: |
          echo "[*] Staging Factory Builder..."
          ./setup-factory.sh ./factory
          cd ./factory
          echo "[*] Compiling bootable SquashFS ISO..."
          export SOURCE_DIR=".."
          sudo -E ./build-image.sh 2>&1 | tee build.log

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: anodyne-os-iso
          path: ./factory/binary.hybrid.iso
          if-no-files-found: error

      - name: Run QEMU Headless Integration Test
        run: |
          echo "[*] Executing QEMU smoke test..."
          ./scripts/run-qemu-ci-test.sh ./factory/binary.hybrid.iso

      - name: Push Logs on Failure
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          # Create and switch to a clean branch, copying the build log from the checkout
          git checkout -b ci-logs || (git checkout ci-logs && git reset --hard origin/main)
          cp ./factory/build.log . || true
          git add build.log || true
          git commit -m "ci: upload build logs [skip ci]" || true
          git push origin ci-logs --force
