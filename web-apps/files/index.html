<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files | Anodyne File Viewer</title>
    <link rel="stylesheet" href="style.css">
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>
    <div class="files-app-container">
        <!-- Sidebar Navigation -->
        <aside class="files-sidebar">
            <div class="section-title">User Folders</div>
            <ul class="drive-list">
                <li id="sb-user-home" class="active" onclick="switchDirectory('user-home')">
                    <span class="icon">🔑</span>
                    <span class="label">tpm-luks User (/home)</span>
                </li>
            </ul>

            <div class="section-title">Devices</div>
            <ul class="drive-list">
                <li id="sb-external-usb" onclick="switchDirectory('external-usb')">
                    <span class="icon">🔌</span>
                    <span class="label">External USB Backup</span>
                </li>
            </ul>

            <div class="section-title">Trash</div>
            <ul class="drive-list">
                <li id="sb-recycle-bin" onclick="switchDirectory('recycle-bin')">
                    <span class="icon">🗑️</span>
                    <span class="label">Recycle Bin</span>
                </li>
            </ul>
        </aside>

        <!-- Main Explorer Area -->
        <main class="files-main">
            <header class="explorer-header">
                <div class="path-bar">
                    <span>Path:</span>
                    <span id="current-path" class="path-text">/var/lib/anodyne/rootfs/</span>
                </div>
                <button class="btn btn-primary" onclick="triggerBackupJob()">
                    <span class="btn-icon">📁</span> Backup Files to USB
                </button>
            </header>

            <!-- File Grid/List -->
            <section class="explorer-content">
                <table class="files-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Size</th>
                            <th>Permissions</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="files-list-body">
                        <!-- Populated dynamically via JS -->
                    </tbody>
                </table>
            </section>

            <!-- Task Telemetry Footer -->
            <footer id="files-telemetry-footer" class="files-footer hidden">
                <div class="footer-job-details">
                    <span class="job-lbl">Async System Copy Job</span>
                    <span id="footer-job-id" class="job-id">ID: ----</span>
                </div>
                <div class="footer-progress-track">
                    <div id="footer-progress-fill" class="footer-progress-fill" style="width: 0%"></div>
                </div>
                <div class="footer-status-row" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <div>
                        <span id="footer-percentage-text">0% Completed</span>
                        <span id="footer-status-msg" style="margin-left: 10px;">Executing File Worker...</span>
                    </div>
                    <div class="job-controls">
                        <button id="btn-pause" class="btn btn-secondary btn-sm" onclick="controlJob('pause')">Pause</button>
                        <button id="btn-resume" class="btn btn-secondary btn-sm hidden" onclick="controlJob('resume')">Resume</button>
                        <button id="btn-cancel" class="btn btn-danger btn-sm" onclick="controlJob('cancel')">Cancel</button>
                    </div>
                </div>
            </footer>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
