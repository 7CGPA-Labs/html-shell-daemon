<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebOS Appliance Homepage</title>
    <link rel="stylesheet" href="style.css">
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>

    <div class="homepage-container">
        <header class="hero-header">
            <h1 id="live-clock">00:00:00</h1>
            <h2 id="user-greeting">Welcome back</h2>
        </header>

        <main class="dashboard-grid">
            
            <section class="card app-launcher-section">
                <h3>System Applications</h3>
                <div class="launcher-grid">
                    <button class="app-card" onclick="launchApp('files')">
                        <span class="icon">📁</span>
                        <span class="label">File Viewer</span>
                    </button>
                    <button class="app-card" onclick="launchApp('settings')">
                        <span class="icon">⚙️</span>
                        <span class="label">OS Settings</span>
                    </button>
                </div>
            </section>

            <section class="card task-monitor-section">
                <h3>Background Operations</h3>
                <div id="no-tasks-msg" class="empty-state">No active background operations.</div>
                
                <div id="active-task-container" class="task-box hidden">
                    <div class="task-details">
                        <span id="task-title">File Copy Operation</span>
                        <span id="task-id">ID: ----</span>
                    </div>
                    <div class="progress-track">
                        <div id="task-progress-fill" class="progress-fill" style="width: 0%"></div>
                    </div>
                    <div class="task-status-row">
                        <span id="task-percentage">0% Completed</span>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
